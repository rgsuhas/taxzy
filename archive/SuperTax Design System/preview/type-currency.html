<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:var(--bg-base);color:var(--text-primary);display:flex;gap:32px;flex-wrap:wrap}
.col .l{font:700 10px/1 var(--font-body);letter-spacing:.12em;text-transform:uppercase;color:var(--text-disabled);margin-bottom:8px}
.col .v{font-feature-settings:"lnum","tnum"}
.a{color:var(--text-primary)}
.b{color:var(--secondary)}
.c{color:var(--accent)}
</style></head><body>
<div class="col"><div class="l">Refund expected</div><div class="t-currency-xl v a">₹28,450</div></div>
<div class="col"><div class="l">TDS paid</div><div class="t-currency-xl v b">₹42,000</div></div>
<div class="col"><div class="l">Tax liability</div><div class="t-currency-xl v c">₹13,550</div></div>
</body></html>
