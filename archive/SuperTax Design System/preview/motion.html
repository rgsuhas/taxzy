<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:var(--bg-base);color:var(--text-primary);font-family:var(--font-body);display:flex;gap:24px;flex-wrap:wrap;align-items:center}
.demo{width:56px;height:56px;background:var(--accent);border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:20px;box-shadow:var(--shadow-md);transition:transform 200ms var(--ease-spring),box-shadow 200ms}
.demo:hover{transform:scale(1.15) rotate(5deg);box-shadow:var(--shadow-lg)}
.pulse{width:12px;height:12px;border-radius:50%;background:var(--secondary);animation:p 2s ease-in-out infinite}
@keyframes p{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.75)}}
.t{font:500 11px/1.4 var(--font-mono);color:var(--text-tertiary)}
.col{display:flex;flex-direction:column;align-items:center;gap:8px}
</style></head><body>
<div class="col"><div class="demo">↗</div><div class="t">spring · 200ms<br>scale + rotate</div></div>
<div class="col"><div class="pulse"></div><div class="t">pulse · 2s<br>opacity + scale</div></div>
<div class="col" style="min-width:160px"><div style="width:100%;height:6px;background:var(--bg-subtle);border-radius:9999px;overflow:hidden"><div style="height:100%;width:60%;background:var(--accent);border-radius:9999px"></div></div><div class="t">progress · 600ms<br>ease in-out</div></div>
</body></html>
