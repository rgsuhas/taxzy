<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:18px;background:var(--bg-base);color:var(--text-primary);font-family:var(--font-body)}
.row{display:flex;flex-wrap:wrap;gap:18px;align-items:center}
.btn{font-family:var(--font-body);font-weight:600;font-size:14px;padding:10px 22px;border-radius:10px;border:none;cursor:pointer;transition:all 180ms cubic-bezier(0.22,1,0.36,1);box-shadow:var(--shadow-sm);display:inline-flex;align-items:center;gap:6px}
.p{background:var(--accent);color:#fff}
.p:hover{background:var(--accent-hover);transform:translateY(-1px);box-shadow:var(--shadow-md)}
.s{background:#fff;color:var(--text-primary);border:1px solid var(--border-strong)}
.s:hover{border-color:var(--accent);transform:translateY(-1px)}
.g{background:transparent;color:var(--accent);border:1px solid var(--st-orange-400);box-shadow:none}
.g:hover{background:var(--accent-subtle)}
.t{background:var(--secondary);color:#fff}
.t:hover{background:var(--secondary-hover);transform:translateY(-1px);box-shadow:var(--shadow-md)}
.d{opacity:.38;cursor:not-allowed}
.lg{font-size:15px;padding:13px 28px}
.sm{font-size:12px;padding:7px 16px}
</style></head><body>
<div class="row">
  <button class="btn p lg">File my taxes</button>
  <button class="btn p">View dashboard</button>
  <button class="btn p sm">Get started</button>
  <button class="btn s">Download PDF</button>
  <button class="btn g">Redeem refund</button>
  <button class="btn t">File safely</button>
  <button class="btn s d">Disabled</button>
</div>
</body></html>
