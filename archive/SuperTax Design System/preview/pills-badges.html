<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:18px;background:var(--bg-base);color:var(--text-primary);font-family:var(--font-body)}
.row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.p{display:inline-flex;align-items:center;gap:5px;font:600 12px/16px var(--font-body);padding:3px 10px;border-radius:9999px;white-space:nowrap}
.d{width:6px;height:6px;border-radius:50%;background:currentColor}
.po{background:var(--accent-subtle);color:var(--accent)}
.pt{background:var(--secondary-subtle);color:var(--secondary)}
.ps{background:var(--status-success-bg);color:var(--status-success)}
.pw{background:var(--status-warning-bg);color:var(--status-warning)}
.pe{background:var(--status-error-bg);color:var(--status-error)}
.pi{background:var(--status-info-bg);color:var(--status-info)}
.pn{background:var(--bg-subtle);color:var(--text-secondary);border:1px solid var(--border-default)}
.b{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;border-radius:9999px;font:700 10px/1 var(--font-body);background:var(--status-error);color:#fff}
.bo{background:var(--accent)}
.bg{background:var(--secondary)}
</style></head><body>
<div class="row" style="margin-bottom:10px">
  <span class="p ps"><span class="d"></span> Refund approved</span>
  <span class="p pw"><span class="d"></span> Processing</span>
  <span class="p pe"><span class="d"></span> Action needed</span>
  <span class="p pi"><span class="d"></span> Filed</span>
</div>
<div class="row" style="margin-bottom:10px">
  <span class="p po">Must have</span>
  <span class="p pt">Should have</span>
  <span class="p pn">Draft</span>
  <span class="p po">AY 2024-25</span>
</div>
<div class="row">
  <span class="b">3</span>
  <span class="b bo">12</span>
  <span class="b bg">99+</span>
  <span class="b" style="width:8px;height:8px;min-width:8px;padding:0;background:var(--secondary)"></span>
</div>
</body></html>
