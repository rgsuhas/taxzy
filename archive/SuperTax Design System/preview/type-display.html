<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:var(--bg-base);color:var(--text-primary)}
.d1{font:800 48px/1.04 var(--font-display);letter-spacing:-0.035em}
.d2{font:800 28px/1.1 var(--font-display);letter-spacing:-0.03em;color:var(--text-tertiary);margin-top:6px}
.tag{display:inline-block;margin-top:14px;font:700 10px/1 var(--font-body);letter-spacing:.12em;text-transform:uppercase;color:var(--accent);padding:4px 8px;border-radius:9999px;background:var(--accent-subtle)}
em{font-style:normal;color:var(--accent)}
</style></head><body>
<div class="d1">File taxes. <em>Fear nothing.</em></div>
<div class="d2">Manrope 800 · 48 px / 28 px · tight tracking</div>
<span class="tag">Display 1 / Hero</span>
</body></html>
