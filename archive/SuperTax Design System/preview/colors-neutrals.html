<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:16px;background:var(--bg-base);font-family:var(--font-body);color:var(--text-primary)}
.row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.sw{border-radius:10px;overflow:hidden;border:1px solid var(--border-default);background:var(--bg-surface-1)}
.sw .c{height:64px}
.sw .m{padding:8px 10px}
.n{font:700 11px/1.2 var(--font-body)}
.v{font:500 10px/1.3 var(--font-mono);color:var(--text-tertiary);margin-top:2px}
</style></head><body>
<div class="row">
<div class="sw"><div class="c" style="background:#1C1F23"></div><div class="m"><div class="n">Ink 900 / Primary text</div><div class="v">#1C1F23</div></div></div>
<div class="sw"><div class="c" style="background:#393D44"></div><div class="m"><div class="n">Ink 700 / Secondary</div><div class="v">#393D44</div></div></div>
<div class="sw"><div class="c" style="background:#5F646D"></div><div class="m"><div class="n">Ink 500 / Tertiary</div><div class="v">#5F646D</div></div></div>
<div class="sw"><div class="c" style="background:#A8ADB5"></div><div class="m"><div class="n">Ink 300 / Disabled</div><div class="v">#A8ADB5</div></div></div>
<div class="sw"><div class="c" style="background:#C4C1BA"></div><div class="m"><div class="n">Stone 300 / Strong border</div><div class="v">#C4C1BA</div></div></div>
<div class="sw"><div class="c" style="background:#DDDAD3"></div><div class="m"><div class="n">Stone 200 / Border</div><div class="v">#DDDAD3</div></div></div>
<div class="sw"><div class="c" style="background:#EAE8E3"></div><div class="m"><div class="n">Stone 100 / Subtle bg</div><div class="v">#EAE8E3</div></div></div>
<div class="sw"><div class="c" style="background:#F3F2EF"></div><div class="m"><div class="n">Stone 50 / Page bg</div><div class="v">#F3F2EF</div></div></div>
<div class="sw"><div class="c" style="background:#FAF9F6"></div><div class="m"><div class="n">Paper / Surface 2</div><div class="v">#FAF9F6</div></div></div>
<div class="sw"><div class="c" style="background:#FFFFFF;border:1px solid #DDDAD3"></div><div class="m"><div class="n">Paper / Surface 1</div><div class="v">#FFFFFF</div></div></div>
</div>
</body></html>
