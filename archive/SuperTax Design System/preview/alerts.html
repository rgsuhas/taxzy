<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"><style>
body{margin:0;padding:14px;background:var(--bg-base);color:var(--text-primary);font-family:var(--font-body);display:flex;flex-direction:column;gap:10px}
.a{display:flex;gap:12px;padding:12px 14px;border-radius:10px;border-left:3px solid;font-size:13px;line-height:1.5}
.a i{font-size:16px;margin-top:1px;flex-shrink:0}
.t{font-weight:700;font-size:13px;margin-bottom:2px}
.s{background:var(--status-success-bg);border-color:var(--status-success);color:var(--status-success)}
.w{background:var(--status-warning-bg);border-color:var(--status-warning);color:var(--status-warning)}
.e{background:var(--status-error-bg);border-color:var(--status-error);color:var(--status-error)}
.i{background:var(--status-info-bg);border-color:var(--status-info);color:var(--status-info)}
.b{color:var(--text-secondary);font-size:13px}
</style></head><body>
<div class="a s"><i class="ti ti-circle-check"></i><div><div class="t">Refund initiated</div><div class="b">₹28,450 will credit in 3–5 business days.</div></div></div>
<div class="a w"><i class="ti ti-alert-triangle"></i><div><div class="t">Document required</div><div class="b">Upload your Form 16 to complete income verification.</div></div></div>
<div class="a e"><i class="ti ti-circle-x"></i><div><div class="t">AIS mismatch detected</div><div class="b">AIS shows ₹9,20,000 — you entered ₹8,40,000. Please reconcile.</div></div></div>
</body></html>
