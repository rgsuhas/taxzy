<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"><style>
body{margin:0;padding:18px;font-family:var(--font-body);color:var(--text-primary);
  background:radial-gradient(120% 80% at 0% 0%, #E8EEF5 0%, transparent 55%),
             radial-gradient(120% 80% at 100% 100%, #F7EFE6 0%, transparent 50%),
             #F3F2EF}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.c{border-radius:16px;padding:16px 18px;background:var(--glass-bg);
   -webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);
   border:1px solid var(--glass-border);box-shadow:var(--shadow-glass);position:relative;overflow:hidden}
.c::before{content:"";position:absolute;inset:0;background:var(--glass-highlight);pointer-events:none;border-radius:inherit}
.lbl{font:700 10px/1 var(--font-body);letter-spacing:.1em;text-transform:uppercase;color:var(--text-disabled)}
.val{font:800 28px/1 var(--font-display);letter-spacing:-.03em;margin-top:6px;font-feature-settings:"lnum","tnum"}
.r{display:flex;align-items:center;gap:6px;font:600 11px/1 var(--font-body);color:var(--status-success);margin-top:8px}
.refund{grid-column:1/-1;background:linear-gradient(135deg,#3D5A80 0%,#1F3654 100%);color:#fff;border:none}
.refund::before{background:linear-gradient(135deg, rgba(255,255,255,0.22), transparent 60%)}
.refund .lbl{color:rgba(255,255,255,.8)}
.refund .val{font-size:36px}
.refund .b{font-size:13px;opacity:.9;margin-top:4px}
</style></head><body>
<div class="grid">
  <div class="c"><div class="lbl">Gross income</div><div class="val">₹9,20,000</div><div class="r"><i class="ti ti-arrow-up-right"></i> +12% YoY</div></div>
  <div class="c"><div class="lbl">TDS paid</div><div class="val">₹42,000</div><div class="r" style="color:var(--text-tertiary)">By 2 employers</div></div>
  <div class="c refund"><div class="lbl">Refund expected</div><div class="val">₹28,450</div><div class="b">Credited in 3–5 days · or redeem ₹24,000 in vouchers today</div></div>
</div>
</body></html>
