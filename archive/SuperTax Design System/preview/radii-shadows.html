<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:18px;background:var(--bg-base);color:var(--text-primary);display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
.tile{display:flex;flex-direction:column;align-items:center;gap:8px}
.b{width:80px;height:64px;background:#FFFFFF;border:1px solid var(--border-default)}
.s1{box-shadow:var(--shadow-sm)}
.s2{box-shadow:var(--shadow-md)}
.s3{box-shadow:var(--shadow-lg)}
.s4{box-shadow:var(--shadow-xl)}
.r-sm{border-radius:6px}
.r-md{border-radius:10px}
.r-lg{border-radius:16px}
.r-xl{border-radius:24px}
.r-full{border-radius:9999px}
.lbl{font:700 10px/1 var(--font-body);letter-spacing:.08em;text-transform:uppercase;color:var(--text-tertiary)}
.val{font:500 10px/1 var(--font-mono);color:var(--text-disabled)}
</style></head><body>
<div class="tile"><div class="b r-sm s1"></div><div class="lbl">radius sm</div><div class="val">6px</div></div>
<div class="tile"><div class="b r-md s1"></div><div class="lbl">radius md</div><div class="val">10px</div></div>
<div class="tile"><div class="b r-lg s2"></div><div class="lbl">radius lg</div><div class="val">16px</div></div>
<div class="tile"><div class="b r-xl s3"></div><div class="lbl">radius xl</div><div class="val">24px</div></div>
<div class="tile"><div class="b r-full s1"></div><div class="lbl">radius full</div><div class="val">9999px</div></div>
<div class="tile"><div class="b r-md s1"></div><div class="lbl">shadow sm</div><div class="val">y=1, soft</div></div>
<div class="tile"><div class="b r-md s2"></div><div class="lbl">shadow md</div><div class="val">y=4</div></div>
<div class="tile"><div class="b r-md s3"></div><div class="lbl">shadow lg</div><div class="val">y=12</div></div>
<div class="tile"><div class="b r-md s4"></div><div class="lbl">shadow xl</div><div class="val">y=24</div></div>
<div class="tile"><div class="b r-lg" style="background:rgba(255,252,248,.62);backdrop-filter:var(--glass-blur);border-color:var(--glass-border);box-shadow:var(--shadow-glass)"></div><div class="lbl">glass</div><div class="val">blur 18px</div></div>
</body></html>
