<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:16px;background:var(--bg-base);font-family:var(--font-body);color:var(--text-primary)}
.row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.sw{border-radius:10px;overflow:hidden;border:1px solid var(--border-default);background:var(--bg-surface-1)}
.sw .c{height:48px;display:flex;align-items:center;justify-content:center;font:700 12px/1 var(--font-body)}
.sw .m{padding:8px 10px}
.n{font:700 11px/1.2 var(--font-body)}
.v{font:500 10px/1.3 var(--font-mono);color:var(--text-tertiary);margin-top:2px}
</style></head><body>
<div class="row">
<div class="sw"><div class="c" style="background:#E4F0EB;color:#2F7A5E">success</div><div class="m"><div class="n">Success</div><div class="v">#2F7A5E / #E4F0EB</div></div></div>
<div class="sw"><div class="c" style="background:#F6EEDC;color:#A57518">warning</div><div class="m"><div class="n">Warning</div><div class="v">#A57518 / #F6EEDC</div></div></div>
<div class="sw"><div class="c" style="background:#F6E7E7;color:#A33E3E">error</div><div class="m"><div class="n">Error</div><div class="v">#A33E3E / #F6E7E7</div></div></div>
<div class="sw"><div class="c" style="background:#F2F5F9;color:#3D5A80">info</div><div class="m"><div class="n">Info</div><div class="v">#3D5A80 / #F2F5F9</div></div></div>
</div>
</body></html>
