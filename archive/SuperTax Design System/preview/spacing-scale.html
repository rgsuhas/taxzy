<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:16px;background:var(--bg-base);color:var(--text-primary)}
.row{display:flex;align-items:center;gap:16px;padding:7px 0;border-bottom:1px solid var(--border-subtle)}
.row:first-child{border-top:1px solid var(--border-subtle)}
.bar{height:10px;background:var(--accent);opacity:.7;border-radius:3px;flex-shrink:0}
.tk{font:700 11px/1 var(--font-mono);color:var(--text-primary);width:36px}
.lb{font:500 12px/1.4 var(--font-body);color:var(--text-tertiary)}
.px{font:500 11px/1 var(--font-mono);color:var(--text-disabled);margin-left:auto}
</style></head><body>
<div class="row"><div class="tk">1</div><div class="bar" style="width:2px"></div><div class="lb">space-1 — hairline</div><div class="px">2px</div></div>
<div class="row"><div class="tk">2</div><div class="bar" style="width:4px"></div><div class="lb">space-2 — icon gap</div><div class="px">4px</div></div>
<div class="row"><div class="tk">3</div><div class="bar" style="width:8px"></div><div class="lb">space-3 — inline gap</div><div class="px">8px</div></div>
<div class="row"><div class="tk">4</div><div class="bar" style="width:12px"></div><div class="lb">space-4 — tight</div><div class="px">12px</div></div>
<div class="row"><div class="tk">5</div><div class="bar" style="width:16px"></div><div class="lb">space-5 — default</div><div class="px">16px</div></div>
<div class="row"><div class="tk">6</div><div class="bar" style="width:20px"></div><div class="lb">space-6 — card pad</div><div class="px">20px</div></div>
<div class="row"><div class="tk">7</div><div class="bar" style="width:24px"></div><div class="lb">space-7</div><div class="px">24px</div></div>
<div class="row"><div class="tk">8</div><div class="bar" style="width:32px"></div><div class="lb">space-8 — section</div><div class="px">32px</div></div>
<div class="row"><div class="tk">10</div><div class="bar" style="width:48px"></div><div class="lb">space-10 — between cards</div><div class="px">48px</div></div>
<div class="row"><div class="tk">12</div><div class="bar" style="width:80px"></div><div class="lb">space-12 — page section</div><div class="px">80px</div></div>
</body></html>
