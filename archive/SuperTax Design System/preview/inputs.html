<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:18px;background:var(--bg-base);color:var(--text-primary);font-family:var(--font-body);display:grid;grid-template-columns:1fr 1fr;gap:16px}
.w{display:flex;flex-direction:column;gap:6px}
label{font:600 12px/1.2 var(--font-body);color:var(--text-secondary)}
.i{font:400 14px/1.4 var(--font-body);color:var(--text-primary);background:#fff;border:1px solid var(--border-default);border-radius:10px;padding:10px 14px;outline:none;width:100%;box-sizing:border-box}
.i::placeholder{color:var(--text-disabled)}
.i:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,82,26,.12)}
.i.err{border-color:var(--status-error)}
.h{font:400 12px/1.4 var(--font-body);color:var(--text-tertiary)}
.e{font:400 12px/1.4 var(--font-body);color:var(--status-error)}
.g{display:flex;background:#fff;border:1px solid var(--border-default);border-radius:10px;overflow:hidden}
.g .i{border:none;border-radius:0}
.a{padding:0 12px;background:var(--bg-subtle);color:var(--text-tertiary);font:500 13px/1 var(--font-body);display:flex;align-items:center;border-right:1px solid var(--border-default)}
</style></head><body>
<div class="w"><label>PAN number</label><input class="i" placeholder="ABCDE1234F"><div class="h">10-character permanent account number</div></div>
<div class="w"><label>Annual income</label><div class="g"><span class="a">₹</span><input class="i" placeholder="8,40,000"></div></div>
<div class="w"><label>Email</label><input class="i" value="aarav@taxease.in"></div>
<div class="w"><label>Form 16 not found</label><input class="i err" value="not-a-pdf.txt"><div class="e">Upload a PDF of your Form 16</div></div>
</body></html>
