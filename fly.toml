app = "taxzy-backend"
primary_region = "bom"

[build]
  dockerfile = "backend/Dockerfile"
  dockerfile_context = "backend"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[env]
  SETU_API_URL = "https://dg-sandbox.setu.co"

# Set secrets via: fly secrets set GEMINI_API_KEY=... JWT_SECRET=... DATABASE_URL=... SETU_API_KEY=...
